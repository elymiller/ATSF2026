methods: Forecasts based on the seasonal ARIMA use bootstrapped residuals for producing forecast uncertainty. 
methods_long: Uses the ARIMA(), ETS(), and SNAIVE() functions in the fable package to make forecasts and then generates bootstrapped prediction intervals for only the seasonal ARIMA model from the residuals using the generate() function in fable.The ETS and SNAIVE models were used as benchmarks in the development process.
